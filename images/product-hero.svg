<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/><stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00a8b5"/><stop offset="100%" stop-color="#008b96"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- 背景 -->
  <rect width="600" height="400" rx="20" fill="url(#bg)"/>

  <!-- 网格装饰 -->
  <g opacity="0.05" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="600" y2="100"/><line x1="0" y1="200" x2="600" y2="200"/><line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="150" y1="0" x2="150" y2="400"/><line x1="300" y1="0" x2="300" y2="400"/><line x1="450" y1="0" x2="450" y2="400"/>
  </g>

  <!-- 电路板 -->
  <rect x="180" y="80" width="240" height="240" rx="10" fill="#0a1a2e" stroke="#2c5f8a" stroke-width="2"/>
  <!-- 芯片 -->
  <rect x="240" y="150" width="120" height="60" rx="4" fill="#1a3a5c" stroke="#00a8b5" stroke-width="1.5"/>
  <text x="300" y="185" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">ESP32</text>

  <!-- 传感器图标 -->
  <circle cx="220" cy="120" r="18" fill="none" stroke="#f0a030" stroke-width="2"/>
  <text x="220" y="125" text-anchor="middle" fill="#f0a030" font-size="12">🌡</text>

  <circle cx="380" cy="120" r="18" fill="none" stroke="#f0a030" stroke-width="2"/>
  <text x="380" y="125" text-anchor="middle" fill="#f0a030" font-size="12">☀</text>

  <circle cx="220" cy="280" r="18" fill="none" stroke="#00a8b5" stroke-width="2"/>
  <text x="220" y="285" text-anchor="middle" fill="#00a8b5" font-size="12">💡</text>

  <circle cx="380" cy="280" r="18" fill="none" stroke="#00a8b5" stroke-width="2"/>
  <text x="380" y="285" text-anchor="middle" fill="#00a8b5" font-size="12">🌀</text>

  <!-- 连接线 -->
  <g stroke="#2c5f8a" stroke-width="1" opacity="0.6">
    <line x1="238" y1="120" x2="255" y2="165"/>
    <line x1="362" y1="120" x2="345" y2="165"/>
    <line x1="255" y1="200" x2="238" y2="265"/>
    <line x1="345" y1="200" x2="362" y2="265"/>
  </g>

  <!-- WiFi 图标 -->
  <g transform="translate(300, 95)" fill="none" stroke="#00a8b5" stroke-width="2.5" filter="url(#glow)">
    <path d="M-25,-5 Q0,-25 25,-5" />
    <path d="M-17,-2 Q0,-15 17,-2" />
    <circle cx="0" cy="0" r="3" fill="#00a8b5"/>
  </g>

  <!-- 标题 -->
  <text x="300" y="370" text-anchor="middle" fill="#fff" font-size="22" font-weight="800" letter-spacing="2">PCT-100</text>
  <text x="300" y="390" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11">化工控制实训装置</text>
</svg>
